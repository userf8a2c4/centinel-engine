<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800" height="160">
  <defs>
    <style>
      .title { font-family: 'Courier New', Courier, monospace; font-weight: 700; font-size: 72px; fill: #2b6cb0; letter-spacing: 8px; }
      .subtitle { font-family: 'Courier New', Courier, monospace; font-weight: 400; font-size: 18px; fill: #4a5568; letter-spacing: 3px; }
      .chain { fill: none; stroke: #2b6cb0; stroke-width: 3; stroke-linecap: round; }
      .chain-link { fill: none; stroke: #2b6cb0; stroke-width: 3; }
      .accent { fill: #2f855a; }
    </style>
  </defs>

  <!-- Chain icon (left) -->
  <g transform="translate(18, 30)">
    <!-- Block 1 -->
    <rect x="0" y="20" width="28" height="22" rx="4" fill="none" stroke="#2b6cb0" stroke-width="2.5"/>
    <line x1="4" y1="28" x2="24" y2="28" stroke="#2b6cb0" stroke-width="1.5"/>
    <line x1="4" y1="34" x2="18" y2="34" stroke="#2b6cb0" stroke-width="1.5"/>
    <!-- Link 1→2 -->
    <line x1="28" y1="31" x2="36" y2="31" stroke="#2b6cb0" stroke-width="2"/>
    <!-- Block 2 -->
    <rect x="36" y="20" width="28" height="22" rx="4" fill="none" stroke="#2f855a" stroke-width="2.5"/>
    <line x1="40" y1="28" x2="60" y2="28" stroke="#2f855a" stroke-width="1.5"/>
    <line x1="40" y1="34" x2="54" y2="34" stroke="#2f855a" stroke-width="1.5"/>
    <!-- Link 2→3 -->
    <line x1="64" y1="31" x2="72" y2="31" stroke="#2b6cb0" stroke-width="2"/>
    <!-- Block 3 -->
    <rect x="72" y="20" width="28" height="22" rx="4" fill="none" stroke="#2b6cb0" stroke-width="2.5"/>
    <line x1="76" y1="28" x2="96" y2="28" stroke="#2b6cb0" stroke-width="1.5"/>
    <line x1="76" y1="34" x2="90" y2="34" stroke="#2b6cb0" stroke-width="1.5"/>
    <!-- Bitcoin anchor dot -->
    <circle cx="50" cy="70" r="5" fill="#2f855a"/>
    <line x1="50" y1="42" x2="50" y2="65" stroke="#2f855a" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="58" y="75" font-family="Courier New, monospace" font-size="10" fill="#2f855a">⛓ BTC</text>
  </g>

  <!-- Main title -->
  <text x="160" y="92" class="title">CENTINEL</text>

  <!-- Subtitle -->
  <text x="162" y="125" class="subtitle">Trustless Electoral Integrity · Latin America</text>

  <!-- Decorative line -->
  <line x1="160" y1="135" x2="790" y2="135" stroke="#2b6cb0" stroke-width="1" opacity="0.3"/>
</svg>
