<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CENTINEL — Acceso Académico</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
<script src="../config.js"></script>
<style>
:root{--bg:#0f1115;--panel:#15171c;--border:#24272e;--fg:#e7e9ec;
  --muted:#8b929c;--accent:#6ea8fe;--ok:#57c08d;--bad:#df6b86;--purple:#b08cf0}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:system-ui,sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;
  padding:36px 40px;width:100%;max-width:380px}
.logo{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:6px}
h1{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px}
.sub{font-size:13px;color:var(--muted);margin-bottom:28px}
label{display:block;font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
input{width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;color:var(--fg);font-size:14px;
  outline:none;transition:.15s;margin-bottom:16px}
input:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted)}
button{width:100%;background:var(--accent);color:#0f1115;border:none;
  border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;
  transition:.15s;margin-top:4px}
button:hover{opacity:.88}
button:disabled{opacity:.5;cursor:not-allowed}
.err{font-size:12px;color:var(--bad);margin-top:12px;min-height:18px;text-align:center}
.back{margin-top:20px;text-align:center;font-size:12px;color:var(--muted)}
.back a{color:var(--muted);text-decoration:none}
.back a:hover{color:var(--fg)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">CENTINEL Electoral</div>
  <h1>Acceso académico</h1>
  <p class="sub">Simulación Forense — uso restringido a investigadores</p>

  <label for="email">Correo electrónico</label>
  <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email">

  <label for="pass">Contraseña</label>
  <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password"
         onkeydown="if(event.key==='Enter')doLogin()">

  <button id="btn-login" onclick="doLogin()">Entrar</button>
  <div class="err" id="err-msg"></div>

  <div class="back"><a href="../">← Volver al inicio</a></div>
</div>

<script>
const SUPABASE_URL  = window.CENTINEL_SUPABASE_URL  || '';
const SUPABASE_ANON = window.CENTINEL_SUPABASE_ANON || '';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// Si ya hay sesión activa, ir directo al sandbox
sb.auth.getSession().then(({data:{session}})=>{
  if(session) window.location.replace('./');
});

async function doLogin(){
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const btn   = document.getElementById('btn-login');
  const err   = document.getElementById('err-msg');
  if(!email||!pass){err.textContent='Completa los dos campos.';return;}
  btn.disabled=true;btn.textContent='Verificando…';err.textContent='';
  const {error} = await sb.auth.signInWithPassword({email,password:pass});
  if(error){
    err.textContent = error.message==='Invalid login credentials'
      ? 'Credenciales incorrectas.' : error.message;
    btn.disabled=false;btn.textContent='Entrar';
  } else {
    window.location.replace('./');
  }
}
</script>
</body>
</html>
