app = "centinel-engine"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[processes]
  app = "python -m uvicorn api.main:app --host 0.0.0.0 --port 8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
