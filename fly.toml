app = "centinel"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONPATH = "/app/src"
  PYTHONUNBUFFERED = "1"
  PORT = "8080"
  # Gunicorn tuning for shared-cpu-1x (1024 MB)
  WEB_CONCURRENCY = "2"

[processes]
  app = "gunicorn api.main:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8080 --workers 2 --timeout 120 --graceful-timeout 30 --keep-alive 5 --access-logfile -"

[deploy]
  strategy = "rolling"
  release_command = "python -c \"import api.main; print('Import OK')\""

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [http_service.checks]
    [http_service.checks.liveness]
      grace_period = "30s"
      interval = "15s"
      method = "GET"
      path = "/live"
      timeout = "5s"

    [http_service.checks.readiness]
      grace_period = "60s"
      interval = "30s"
      method = "GET"
      path = "/health"
      timeout = "10s"

[checks]
  [checks.startup]
    type = "http"
    port = 8080
    method = "GET"
    path = "/live"
    interval = "10s"
    timeout = "5s"
    grace_period = "30s"

[[restart]]
  policy = "on-failure"
  max_retries = 5

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
