app = "centinel-engine"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[processes]
  app = "python -m uvicorn api.main:app --host 0.0.0.0 --port 8080"

[deploy]
  strategy = "rolling"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.checks]
    [http_service.checks.liveness]
      grace_period = "30s"
      interval = "15s"
      method = "GET"
      path = "/live"
      timeout = "5s"

    [http_service.checks.readiness]
      grace_period = "60s"
      interval = "30s"
      method = "GET"
      path = "/healthz"
      timeout = "10s"

[checks]
  [checks.startup]
    type = "http"
    port = 8080
    method = "GET"
    path = "/live"
    interval = "10s"
    timeout = "5s"
    grace_period = "30s"

[[restart]]
  policy = "on-failure"
  max_retries = 5

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
