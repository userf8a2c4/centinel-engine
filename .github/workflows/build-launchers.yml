name: Build Launchers

on:
  release:
    types: [published]
  workflow_dispatch:

# Builds single-file executables for Windows, macOS, and Linux.
# Artifacts are attached to the GitHub Release as downloadable assets.

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: Centinel-Windows.exe
            pyinstaller_args: "--onefile --windowed --name Centinel-Windows scripts/launch.py"
          - os: macos-latest
            artifact: Centinel-macOS
            pyinstaller_args: "--onefile --name Centinel-macOS scripts/launch.py"
          - os: ubuntu-latest
            artifact: Centinel-Linux
            pyinstaller_args: "--onefile --name Centinel-Linux scripts/launch.py"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: pip install pyinstaller

      - name: Build executable
        run: pyinstaller ${{ matrix.pyinstaller_args }}

      - name: Upload to Release
        if: github.event_name == 'release'
        run: gh release upload ${{ github.ref_name }} dist/${{ matrix.artifact }}* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*
