name: Setup Wizard

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      country:
        description: 'País a auditar'
        required: false
        type: choice
        default: 'HN'
        options:
          - HN   # Honduras — TSE/CNE (implementado)
          - GT   # Guatemala — TSE (próximamente)
          - SV   # El Salvador — TSE (próximamente)
          - VE   # Venezuela — CNE (próximamente)
          - MX   # México — INE (próximamente)
          - CO   # Colombia — CNE (próximamente)
      election_url:
        description: 'URL de la autoridad electoral (ej: https://resultados2029.cne.hn/)'
        required: false
        type: string
      ots_enabled:
        description: 'Habilitar anclaje Bitcoin OTS (recomendado: true)'
        required: false
        type: boolean
        default: true
  schedule:
    - cron: '0 */6 * * *'  # cada 6 horas mientras haya un issue de setup abierto

permissions:
  issues: write
  contents: write
  pages: write
  id-token: write

jobs:
  wizard:
    runs-on: ubuntu-latest
    steps:
      - name: Verify caller is repo owner
        run: |
          if [ "${{ github.actor }}" != "${{ github.repository_owner }}" ]; then
            echo "❌ Acceso denegado."
            echo "Solo el propietario del repositorio puede ejecutar el Setup Wizard."
            echo "Actor:  ${{ github.actor }}"
            echo "Owner:  ${{ github.repository_owner }}"
            exit 1
          fi
          echo "✅ Verificado: ${{ github.actor }} es el propietario del repositorio."

      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check setup state
        id: check
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          if [ -z "$DATA_REPO_TOKEN" ]; then
            echo "state=needs_token" >> $GITHUB_OUTPUT
            exit 0
          fi
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $DATA_REPO_TOKEN" \
            "https://api.github.com/repos/$REPO_OWNER/centinel-data")
          if [ "$HTTP" = "404" ]; then
            echo "state=needs_repo" >> $GITHUB_OUTPUT
          elif [ "$HTTP" = "200" ]; then
            echo "state=ready" >> $GITHUB_OUTPUT
          else
            echo "state=error_$HTTP" >> $GITHUB_OUTPUT
          fi

      - name: Open setup issue (token missing)
        if: steps.check.outputs.state == 'needs_token'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const existing = await github.rest.issues.listForRepo({
              owner, repo, labels: 'centinel-setup', state: 'open', per_page: 1
            });
            if (existing.data.length > 0) {
              console.log('Setup issue already open, skipping');
              return;
            }
            await github.rest.issues.create({
              owner, repo,
              title: '⚙️ Acción requerida: conectar repositorio de datos',
              labels: ['centinel-setup'],
              body: [
                '> 📍 **Estás en el paso 3** de la guía de despliegue en tu README.',
                '> Cuando termines los dos pasos de abajo, usa el link del final para continuar con el **paso 4**.',
                '',
                '## Crear y conectar el token de acceso',
                '',
                'El sistema necesita un token para crear y gestionar el repositorio de datos.',
                'Es el único paso que GitHub no permite automatizar por razones de seguridad.',
                '',
                '### Paso 1 — Crear el token (30 segundos)',
                '',
                `**[→ Abrir GitHub: crear token](https://github.com/settings/tokens/new?description=centinel-data&scopes=repo)**`,
                '',
                '- Baja hasta el botón **"Generate token"**',
                '- Clic en **"Generate token"**',
                '- **Copia el token** que aparece (solo se muestra una vez)',
                '',
                '### Paso 2 — Guardar el token (30 segundos)',
                '',
                `**[→ Abrir GitHub: añadir secret](https://github.com/${owner}/${repo}/settings/secrets/actions/new)**`,
                '',
                '- **Name:** `DATA_REPO_TOKEN`',
                '- **Secret:** pega el token copiado',
                '- Clic en **"Add secret"**',
                '',
                '---',
                '',
                '**✅ Cuando termines los dos pasos, vuelve aquí y haz clic:**',
                `**[→ Re-ejecutar el Setup Wizard](https://github.com/${owner}/${repo}/actions/workflows/setup-wizard.yml)**`,
                '→ Clic en **"Run workflow"** → aparece un formulario con estas opciones:',
                '  - **País a auditar** → selecciona tu país (ej: `HN` para Honduras)',
                '  - **URL de la autoridad electoral** → pega la URL oficial (ej: `https://resultados2029.cne.hn/`)',
                '  - Clic en **"Run workflow"**',
                '',
                'El wizard detectará los endpoints automáticamente, generará los seeds de acceso y completará el setup.',
                '',
                '> Los seeds se subirán como artifact descargable en el propio run — el link aparecerá en este Issue al finalizar.',
              ].join('\n')
            });

      - name: Handle token error (expired or wrong permissions)
        if: startsWith(steps.check.outputs.state, 'error_4')
        env:
          CENTINEL_NTFY_TOPIC: ${{ secrets.CENTINEL_NTFY_TOPIC }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          STATE: ${{ steps.check.outputs.state }}
        run: |
          [ -n "$CENTINEL_NTFY_TOPIC" ] && curl -s \
            -H "Priority: urgent" -H "Tags: key,warning" \
            -d "Centinel — token DATA_REPO_TOKEN inválido (${STATE}). Ve al Issue abierto en tu repo de GitHub." \
            "https://ntfy.sh/${CENTINEL_NTFY_TOPIC}" || true
      - name: Open token error issue
        if: startsWith(steps.check.outputs.state, 'error_4')
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const state = '${{ steps.check.outputs.state }}';
            const is401 = state === 'error_401';
            const existing = await github.rest.issues.listForRepo({
              owner, repo, labels: 'centinel-token-error', state: 'open', per_page: 1
            });
            if (existing.data.length > 0) return;
            const title = is401
              ? '🔑 Token DATA_REPO_TOKEN expirado — renovación necesaria'
              : '🔑 Token DATA_REPO_TOKEN con error de acceso — verificar tipo de token';
            await github.rest.issues.create({
              owner, repo,
              title,
              labels: ['centinel-token-error'],
              body: [
                `## El wizard recibió \`${state}\` al intentar acceder a centinel-data.`,
                '',
                is401
                  ? '**Causa más probable:** el token expiró o fue revocado.'
                  : '**Causa más probable:** el token es Fine-grained (no compatible) o tiene permisos insuficientes.',
                '',
                '### Solución en 2 pasos',
                '',
                '**Paso 1 — Crear un nuevo Classic PAT:**',
                `**[→ Crear token (scopes preconfigurados)](https://github.com/settings/tokens/new?description=centinel-data&scopes=repo)**`,
                '- Confirma que **repo** está marcado (acceso completo)',
                '- Clic en **"Generate token"** → copia el token',
                '',
                '**Paso 2 — Actualizar el secret:**',
                `**[→ Ir a Settings → Secrets → DATA_REPO_TOKEN](https://github.com/${owner}/${repo}/settings/secrets/actions)**`,
                '- Clic en **DATA_REPO_TOKEN** → "Update" → pega el nuevo token → Save',
                '',
                '> ⚠️ **Usa siempre Classic PAT** — los Fine-grained PAT no son compatibles con la API v3 de GitHub que usa este sistema y fallan silenciosamente.',
                '',
                '---',
                '',
                '**✅ El wizard detectará el token renovado en el próximo ciclo horario automáticamente.**',
                `O re-ejecútalo ahora: **[Setup Wizard → Run workflow](https://github.com/${owner}/${repo}/actions/workflows/setup-wizard.yml)**`,
              ].join('\n')
            });

      - name: Create centinel-data repo automatically
        if: steps.check.outputs.state == 'needs_repo'
        id: create_repo
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          # Create the repo
          curl -sS --fail \
            -H "Authorization: Bearer $DATA_REPO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"centinel-data\",\"description\":\"Datos públicos de auditoría electoral — publicados automáticamente por centinel-engine\",\"private\":false,\"auto_init\":true}" \
            "https://api.github.com/user/repos"

          sleep 5  # wait for repo to initialize with its first commit

          echo "repo_created=true" >> $GITHUB_OUTPUT

      - name: Create organized department structure in centinel-data
        if: steps.create_repo.outputs.repo_created == 'true'
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          CENTINEL_COUNTRY: ${{ github.event.inputs.country || 'HN' }}
          CENTINEL_YEAR: "2025"
        run: |
          pip install -q pyyaml 2>/dev/null || true
          python3 .github/scripts/wizard_repo_structure.py

      - name: Initialize centinel-data workflows
        if: steps.create_repo.outputs.repo_created == 'true'
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          BASE_URL="https://api.github.com/repos/$REPO_OWNER/centinel-data"

          push_file() {
            local path="$1"
            local content="$2"
            local b64=$(echo "$content" | base64 -w 0)
            curl -sS --fail \
              -H "Authorization: Bearer $DATA_REPO_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"message\":\"init: $path\",\"content\":\"$b64\"}" \
              "$BASE_URL/contents/$path" > /dev/null
          }

          push_file ".github/workflows/ipfs-pin.yml" 'name: IPFS Pin (Optional)
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  pin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pin to IPFS via Pinata
        if: ${{ toJSON(secrets.PINATA_JWT) != '"'"'null'"'"' }}
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: |
          tar czf /tmp/centinel-data.tar.gz --exclude='"'"'.git'"'"' .
          RESPONSE=$(curl -sS --fail \
            -H "Authorization: Bearer $PINATA_JWT" \
            -F "file=@/tmp/centinel-data.tar.gz" \
            "https://api.pinata.cloud/pinning/pinFileToIPFS")
          CID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['"'"'IpfsHash'"'"'])")
          echo "Pinned: ipfs://$CID"
          python3 - <<EOF
import json, os
from datetime import datetime, timezone
with open("ipfs-manifest.json") as f:
    m = json.load(f)
m["snapshots"].append({"cid": "$CID", "timestamp": datetime.now(timezone.utc).isoformat()})
m["last_updated"] = datetime.now(timezone.utc).isoformat()
with open("ipfs-manifest.json", "w") as f:
    json.dump(m, f, indent=2)
EOF
          git config user.name "centinel-bot"
          git config user.email "bot@centinel.app"
          git add ipfs-manifest.json
          git diff --cached --quiet || git commit -m "ipfs: pin $CID"
          git push'

          push_file ".github/workflows/auto-release.yml" 'name: Weekly Backup Release
on:
  schedule:
    - cron: '"'"'0 3 * * 0'"'"'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create backup archive
        run: |
          TAG="backup-$(date -u +%Y-%m-%d)"
          zip -r "centinel-data-${TAG}.zip" . --exclude "*.git*"
          SHA=$(sha256sum "centinel-data-${TAG}.zip" | cut -d" " -f1)
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "SHA=$SHA" >> $GITHUB_ENV
          echo "ZIPFILE=centinel-data-${TAG}.zip" >> $GITHUB_ENV
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "Backup ${{ env.TAG }}"
          body: |
            Backup automático semanal de centinel-data.
            SHA256: `${{ env.SHA }}`
          files: ${{ env.ZIPFILE }}'

          echo "Workflows initialized"

      - name: Enable GitHub Pages automatically
        if: steps.check.outputs.state == 'ready' || steps.check.outputs.state == 'needs_repo'
        id: pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          PAGES_HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/pages")

          if [ "$PAGES_HTTP" = "200" ]; then
            echo "pages_enabled=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Try to enable Pages with Actions as source
          ENABLE_HTTP=$(curl -s -o /tmp/pages_resp.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d '{"build_type":"workflow"}' \
            "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/pages")

          if [ "$ENABLE_HTTP" = "201" ] || [ "$ENABLE_HTTP" = "200" ]; then
            echo "pages_enabled=true" >> $GITHUB_OUTPUT
          else
            echo "pages_enabled=false" >> $GITHUB_OUTPUT
            echo "pages_http=$ENABLE_HTTP" >> $GITHUB_OUTPUT
          fi

      - name: Open Pages setup issue (if auto-enable failed)
        if: steps.pages.outputs.pages_enabled == 'false'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const existing = await github.rest.issues.listForRepo({
              owner, repo, labels: 'centinel-pages', state: 'open', per_page: 1
            });
            if (existing.data.length > 0) return;
            await github.rest.issues.create({
              owner, repo,
              title: '🌐 Acción requerida: activar el panel de visualización',
              labels: ['centinel-pages'],
              body: [
                '## Un solo clic para activar el panel público',
                '',
                'El sistema intentó activar GitHub Pages automáticamente pero necesita confirmación manual.',
                '',
                '### Único paso',
                '',
                `**[→ Abrir configuración de Pages](https://github.com/${owner}/${repo}/settings/pages)**`,
                '',
                '- En **"Source"**, selecciona: **GitHub Actions**',
                '- Clic en **"Save"**',
                '',
                '---',
                '',
                `**Tu panel estará disponible en:** \`https://${owner}.github.io/${repo}/\``,
                '',
                '**✅ Cuando lo actives, el panel se desplegará automáticamente** en cada actualización de datos.',
                '',
                '> Para personalizar credenciales (Supabase) o dominio propio: [docs/PAGES-GUIDE.md](https://github.com/' + owner + '/' + repo + '/blob/main/docs/PAGES-GUIDE.md)',
              ].join('\n')
            });

      - name: Save election URL to config
        if: github.event.inputs.election_url != ''
        env:
          ELECTION_URL: ${{ github.event.inputs.election_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          # Write URL to config/prod/endpoints.yaml (the healer reads this as main_url)
          python3 - <<'PYEOF'
import yaml, os
from pathlib import Path
url = os.environ["ELECTION_URL"].strip()
p = Path("config/prod/endpoints.yaml")
cfg = yaml.safe_load(p.read_text()) if p.exists() else {}
cfg.setdefault("cne", {})
cfg["cne"]["main_url"] = url
cfg["cne"]["presidential_endpoints"] = []  # force re-discovery with new URL
p.parent.mkdir(parents=True, exist_ok=True)
p.write_text(yaml.safe_dump(cfg, sort_keys=False, allow_unicode=True))
print(f"Election URL saved: {url}")
PYEOF

          # Also save as repo Actions variable so workflows can read it without checking out code
          curl -sS -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"ELECTION_URL\",\"value\":\"$ELECTION_URL\"}" \
            "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/actions/variables" 2>/dev/null || \
          curl -sS -X PATCH \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"value\":\"$ELECTION_URL\"}" \
            "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/actions/variables/ELECTION_URL" 2>/dev/null || true

          git config user.name "centinel-bot"
          git config user.email "bot@centinel.app"
          git add config/prod/endpoints.yaml
          if ! git diff --cached --quiet; then
            git commit -m "config: set election URL to $ELECTION_URL"
            git pull --rebase origin main || true
            git push
          fi

      - name: Write country config
        if: steps.check.outputs.state == 'ready' || steps.check.outputs.state == 'needs_repo'
        env:
          CENTINEL_COUNTRY: ${{ github.event.inputs.country || 'HN' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          pip install -q pyyaml 2>/dev/null || true
          python3 .github/scripts/wizard_config.py
          git config user.name "centinel-bot"
          git config user.email "bot@centinel.app"
          git add command_center/config.yaml
          git diff --cached --quiet || git commit -m "config: set country=$CENTINEL_COUNTRY via setup wizard"

      - name: Generate seeds and access.json
        if: steps.check.outputs.state == 'ready' || steps.check.outputs.state == 'needs_repo'
        id: seeds
        env:
          CENTINEL_COUNTRY: ${{ github.event.inputs.country || 'HN' }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python3 .github/scripts/wizard_seeds.py
          git config user.name "centinel-bot"
          git config user.email "bot@centinel.app"
          git add web/access.json
          git diff --cached --quiet || git commit -m "security: generate seeds hashes (PBKDF2-SHA256 x600K)"

      - name: Upload seeds artifact (expires 24h — download immediately)
        if: steps.check.outputs.state == 'ready' || steps.check.outputs.state == 'needs_repo'
        uses: actions/upload-artifact@v4
        with:
          name: centinel-seeds-DESCARGAR-Y-GUARDAR-FUERA-DE-LINEA
          path: /tmp/centinel-seeds.txt
          retention-days: 1

      - name: Finalize README and deploy panel
        if: steps.check.outputs.state == 'ready' || steps.check.outputs.state == 'needs_repo'
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Update data and Pages links
          DATA_LINK="[centinel-data →](https://github.com/${REPO_OWNER}/centinel-data)"
          sed -i "s|<!-- CENTINEL_DATA_URL -->.*<!-- /CENTINEL_DATA_URL -->|<!-- CENTINEL_DATA_URL -->${DATA_LINK}<!-- /CENTINEL_DATA_URL -->|" README.md

          PAGES_LINK="[Panel →](https://${REPO_OWNER}.github.io/${REPO_NAME}/)"
          sed -i "s|<!-- CENTINEL_PAGES_URL -->.*<!-- /CENTINEL_PAGES_URL -->|<!-- CENTINEL_PAGES_URL -->${PAGES_LINK}<!-- /CENTINEL_PAGES_URL -->|" README.md

          # In forks: update CI badge + replace INSTANCE-STATUS with live status
          ORIGINAL_OWNER="userf8a2c4"
          ORIGINAL_REPO="centinel-engine"
          if [ "$REPO_OWNER" != "$ORIGINAL_OWNER" ] || [ "$REPO_NAME" != "$ORIGINAL_REPO" ]; then
            sed -i "s|github.com/${ORIGINAL_OWNER}/${ORIGINAL_REPO}/actions|github.com/${REPO_OWNER}/${REPO_NAME}/actions|g" README.md
            python3 - "$REPO_OWNER" "$REPO_NAME" <<'PYEOF'
import re, sys
owner, repo = sys.argv[1:]
with open('README.md') as f:
    content = f.read()
status = f"""<!-- INSTANCE-STATUS-START -->
---

## ✅ Esta instancia está operativa

**Repositorio de datos:** [centinel-data →](https://github.com/{owner}/centinel-data)
**Panel de visualización:** [Panel →](https://{owner}.github.io/{repo}/)

<!-- INSTANCE-STATUS-END -->"""
content = re.sub(
    r'<!-- INSTANCE-STATUS-START -->.*?<!-- INSTANCE-STATUS-END -->',
    status, content, flags=re.DOTALL
)
with open('README.md', 'w') as f:
    f.write(content)
PYEOF
          fi

          git config user.name "centinel-bot"
          git config user.email "bot@centinel.app"
          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "setup: activate instance, transform guide to live status"
            git pull --rebase origin main || true
            git push || true
          fi

          # Trigger panel deployment so it's live without needing a manual push
          curl -sS \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"ref\":\"main\"}" \
            "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows/pages.yml/dispatches" || true

      - name: OTS anchoring — setup info
        if: steps.check.outputs.state == 'ready' || steps.check.outputs.state == 'needs_repo'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const issues = await github.rest.issues.listForRepo({
              owner, repo, labels: 'centinel-setup', state: 'open'
            });
            for (const issue of issues.data) {
              const comments = await github.rest.issues.listComments({
                owner, repo, issue_number: issue.number
              });
              const alreadyPosted = comments.data.some(c =>
                c.body && c.body.includes('⛓ Anclaje Bitcoin'));
              if (!alreadyPosted) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issue.number,
                  body: [
                    '⛓ **Anclaje Bitcoin (OpenTimestamps) — activo por defecto**',
                    '',
                    'El sistema ancla automáticamente cada Merkle root en Bitcoin sin configuración adicional:',
                    '- ✅ Zero-cost — usa 4 calendarios públicos gratuitos',
                    '- ✅ Zero-secrets — no requiere clave privada ni API key',
                    '- ✅ Non-blocking — si el calendario no está disponible, los snapshots continúan normalmente',
                    '',
                    '**Para deshabilitar OTS** (no recomendado), añade en tu repositorio:',
                    '`Settings → Secrets and variables → Actions → Variables → New repository variable`',
                    '```',
                    'Name:  OTS_ENABLED',
                    'Value: false',
                    '```',
                    '',
                    '**Para verificar una prueba OTS** como auditor externo:',
                    '```bash',
                    'pip install opentimestamps-client',
                    'ots verify archivo.ots  # el archivo .ots viene en cada checkpoint',
                    '```',
                    '',
                    `📖 [Documentación técnica completa](https://github.com/${owner}/${repo}/blob/main/docs/EXTERNAL-ANCHOR.md)`,
                  ].join('\n')
                });
              }
            }

      - name: Close setup issue
        if: steps.check.outputs.state == 'ready' || steps.check.outputs.state == 'needs_repo'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Close centinel-setup issues
            const setupIssues = await github.rest.issues.listForRepo({
              owner, repo, labels: 'centinel-setup', state: 'open'
            });
            for (const issue of setupIssues.data) {
              const runId = context.runId;
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: issue.number,
                body: [
                  '✅ **Setup completado.**',
                  '',
                  `**🔐 Seeds de acceso (artifact):**`,
                  `→ [Descargar seeds — expira en 24h](https://github.com/${owner}/${repo}/actions/runs/${runId})`,
                  `  Abre el link, baja hasta "Artifacts" y descarga \`centinel-seeds-DESCARGAR-Y-GUARDAR-FUERA-DE-LINEA\`.`,
                  `  Guárdalo offline. El sistema solo conserva los hashes — si lo pierdes, regenera desde el panel OPS.`,
                  '',
                  `**📊 Panel público:** https://${owner}.github.io/${repo}/`,
                  `**🔧 Panel OPS:** https://${owner}.github.io/${repo}/ops/`,
                  `**💾 Repositorio de datos:** https://github.com/${owner}/centinel-data`,
                  '',
                  'El panel se está desplegando ahora — estará disponible en unos minutos.',
                ].join('\n')
              });
              await github.rest.issues.update({
                owner, repo, issue_number: issue.number, state: 'closed'
              });
            }

            // Close centinel-token-error issues — token is now valid
            const tokenIssues = await github.rest.issues.listForRepo({
              owner, repo, labels: 'centinel-token-error', state: 'open'
            });
            for (const issue of tokenIssues.data) {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: issue.number,
                body: '✅ **Token verificado.** El sistema accedió a centinel-data correctamente — no se requiere ninguna acción adicional.'
              });
              await github.rest.issues.update({
                owner, repo, issue_number: issue.number, state: 'closed'
              });
            }
