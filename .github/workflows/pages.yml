name: Deploy web verifier to GitHub Pages

# Pages must be enabled ONCE by an admin (Settings -> Pages -> Source:
# "GitHub Actions"). Once enabled, every push to dev-v9 that touches
# web/ auto-publishes to https://<owner>.github.io/centinel-engine/.
on:
  push:
    branches: [main, dev-v9, claude/dev-v10-continuation-3CIEe]
    paths: ["web/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
