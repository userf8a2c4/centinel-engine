name: Centinel Pipeline CI

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

# Security: explicit minimal permissions.
permissions:
  contents: read

jobs:
  collector:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: '3.11'
          cache: 'poetry'
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
      - name: Install dependencies
        run: poetry install --no-interaction --no-root
      - name: Debug environment
        run: |
          echo "Python: $(python --version)"
          echo "Poetry: $(poetry --version)"
          env | sort | head -n 40
          ls -la
          ls -la data || true
      - name: Run collector
        run: |
          if ! poetry run python -m scripts.collector; then
            echo "Error details: collector failed"
            ls -la data || true
            exit 1
          fi

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: collector
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: '3.11'
          cache: 'poetry'
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
      - name: Install dependencies
        run: poetry install --no-interaction --no-root
      - name: Debug environment
        run: |
          echo "Python: $(python --version)"
          env | sort | head -n 40
          ls -la data || true
          ls -la hashes || true
      - name: Ejecutar snapshot y hash
        run: |
          if ! poetry run python -m scripts.snapshot; then
            echo "Error details: snapshot/hash failed"
            ls -la data || true
            ls -la hashes || true
            exit 1
          fi


  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: audit
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 0
      - uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: '3.11'
      - name: Export static snapshot
        run: python scripts/export_static_snapshot.py
      - name: Commit and push snapshot.json
        run: |
          git config user.name  "centinel-bot"
          git config user.email "bot@centinel.hn"
          git add web/data/snapshot.json
          git diff --cached --quiet || \
            git commit -m "data: snapshot $(date -u +%Y%m%dT%H%MZ) [skip ci]"
          git push

      - name: Push data to centinel-data
        if: always()
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          if [ -z "$DATA_REPO_TOKEN" ]; then
            echo "INFO: DATA_REPO_TOKEN not configured — data stays local"
            exit 0
          fi
          git clone "https://x-access-token:${DATA_REPO_TOKEN}@github.com/${REPO_OWNER}/centinel-data.git" /tmp/centinel-data
          mkdir -p /tmp/centinel-data/snapshots/latest
          [ -f web/data/snapshot.json ] && cp web/data/snapshot.json /tmp/centinel-data/snapshots/latest/ || true
          cd /tmp/centinel-data
          git config user.name "centinel-bot"
          git config user.email "bot@centinel.app"
          git add .
          git diff --cached --quiet || git commit -m "data: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin main

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: audit
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install security dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit pytest==8.3.3 psutil pyyaml flask requests
      - name: Debug security context
        run: |
          set -x
          pwd
          ls -la
          ls -la scripts || true
          ls -la tests || true
      - name: Run Bandit (developer-friendly in dev branches)
        run: |
          set -x
          if [[ "${GITHUB_REF_NAME}" == dev-v* || "${GITHUB_REF_NAME}" == "work" ]]; then
            bandit -r . -c bandit.yaml --severity-level medium || true
          else
            bandit -r . -c bandit.yaml --severity-level medium
          fi
      - name: Run security suites
        run: |
          set -x
          if [[ "${GITHUB_REF_NAME}" == dev-v* || "${GITHUB_REF_NAME}" == "work" ]]; then
            make security || true
          else
            make security
          fi
