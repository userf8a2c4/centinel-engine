logging:
  level: INFO
  file: C.E.N.T.I.N.E.L.log
alerts:
  critical_anomaly_types:
  - ARITHMETIC_MISMATCH
  - NEGATIVE_DELTA
  - CHANGE_POINT
  - RELATIVE_DELTA
  - SCRUTINY_JUMP
  - VOTE_BREAKDOWN_MISMATCH
  log_path: alerts.log
  output_path: data/alerts.json
security:
  zero_trust: true
  zero_trust_config:
    rate_limit_rpm: 60
    max_body_bytes: 1048576
    ip_blocklist: []
    trusted_proxy_cidrs: []
    blocked_headers: []
  log_hashing: true
  log_encryption: false
  log_encryption_key_env: CENTINEL_LOG_KEY
resilience:
  auto_resume:
    enabled: true
    max_attempts: 5
    backoff_base_seconds: 5
    backoff_max_seconds: 60
    retry_on: any
  chaos:
    enabled: false
    failure_rate: 0.9
    seed: 2026
  dos_thresholds:
    cpu: 90
    memory: 90
    disk: 95
  watchdog_daemon:
    enabled: true
    check_interval_seconds: 30
    cooldown_seconds: 120
    failure_threshold: 3
opentimestamps:
  enabled: true
  calendars:
  - https://alice.btc.calendar.opentimestamps.org
  - https://bob.btc.calendar.opentimestamps.org
  - https://finney.calendar.eternitywall.com
  - https://ots.btc.catallaxy.com
  timeout_seconds: 30
  pending_file: data/pending_ots.json
custody:
  verify_on_startup: true
  verify_anchors_on_startup: false
  verify_signatures: true
  max_anchor_checks: 5
  sign_hash_records: true
  operator_id: default-operator
rules:
  global_enabled: true
  basic_diff:
    enabled: true
  benford_first_digit:
    enabled: true
  benford_law:
    enabled: true
  geographic_dispersion:
    enabled: true
  granular_anomaly:
    enabled: true
    negative_delta_threshold: 0
    delta_pct_alert: 0.5
    delta_pct_time_window_minutes: 30
    zscore_threshold: 3.0
    zscore_min_abs_delta: 100
    zscore_min_departments: 5
    benford_pvalue_threshold: 0.05
    benford_min_samples: 10
    benford_min_vote: 10
    turnout_min_pct: 0
    turnout_max_pct: 100
    reversal_min_lead_margin: 500
    reversal_time_window_minutes: 30
    reversal_min_negative_delta: 100
    sum_mismatch_threshold: 1
  inconsistency_rate:
    enabled: true
    severity: CRITICAL
    critical_pct: 10
    escalation_delta_pct: 0.5
  irreversibility:
    enabled: true
    historical_participation_rate: 0.6
    sqlite_path: reports/irreversibility_state.db
  large_numbers_convergence:
    enabled: true
    min_samples: 30
    z_threshold: 3.0
    min_total_votes: 200
  last_digit_uniformity:
    enabled: true
  late_mesa:
    enabled: true
  mesa_impossibility:
    enabled: true
  mesa_reconciliation:
    enabled: true
  mesas_diff:
    enabled: true
  ml_outliers:
    enabled: true
  null_blank_votes:
    enabled: true
    severity: CRITICAL
    warning_pct: 8
    critical_pct: 12
  participation_anomaly:
    enabled: true
  participation_anomaly_advanced:
    enabled: true
    min_turnout_pct: 40
    max_turnout_pct: 100
    historical_mean: 88.15
    historical_std: 5.51
  participation_vote_correlation:
    enabled: true
    min_samples: 30
    critical_r: 0.85
  processing_speed:
    enabled: true
    max_actas_per_15min: 500
  runs_test:
    enabled: true
    min_samples: 30
    critical_pvalue: 0.01
  snapshot_jump:
    enabled: true
    max_change_pct: 5
    max_minutes: 10
  table_consistency:
    enabled: true
    total_tolerance: 1
  trend_shift:
    enabled: true
    threshold_percent: 10
    max_hours: 3
  turnout_impossible:
    enabled: true
    min_turnout_pct: 0
    max_turnout_pct: 100
centinel:
  country: HN
  year: '2025'
  setup_at: '2026-05-25T06:15:14.290860+00:00'
