worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 256;
}

http {
    access_log /dev/stdout;

    # Temp paths writable by non-root user.
    client_body_temp_path /tmp/nginx-body;
    proxy_temp_path /tmp/nginx-proxy;
    fastcgi_temp_path /tmp/nginx-fastcgi;
    uwsgi_temp_path /tmp/nginx-uwsgi;
    scgi_temp_path /tmp/nginx-scgi;

    # WebSocket upgrade mapping.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream api {
        server 127.0.0.1:8081;
    }

    upstream dashboard {
        server 127.0.0.1:8501;
    }

    server {
        listen 8080;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Health and monitoring endpoints -> FastAPI
        location = /live    { proxy_pass http://api; }
        location = /healthz { proxy_pass http://api; }
        location = /health  { proxy_pass http://api; }
        location = /ready   { proxy_pass http://api; }

        # Public API endpoints -> FastAPI
        location /snapshots { proxy_pass http://api; }
        location /hashchain { proxy_pass http://api; }
        location = /alerts  { proxy_pass http://api; }
        location /api/      { proxy_pass http://api; }

        # Everything else -> Streamlit dashboard
        location / {
            proxy_pass http://dashboard;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }
    }
}
